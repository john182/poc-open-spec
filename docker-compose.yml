services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/MapaTributário
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=mapa_tributario
      - JWT__Secret=${JWT_SECRET:?JWT_SECRET environment variable is required}

  frontend:
    build:
      context: ./frontend/MapaTributario-ui
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  mongo-data:
