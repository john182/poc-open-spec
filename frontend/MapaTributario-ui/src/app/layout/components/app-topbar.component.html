<div class="layout-topbar" data-cy="app-topbar">
  <div class="layout-topbar-logo-container">
    <button type="button" class="layout-menu-button layout-topbar-action" (click)="layoutService.onMenuToggle()" aria-label="Abrir menu">
      <i class="pi pi-bars"></i>
    </button>
    <a class="layout-topbar-logo" routerLink="/">
      <span>Mapa Tributário</span>
    </a>
  </div>

  <div class="layout-topbar-actions">
    <div class="layout-config-menu">
      <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()" aria-label="Alternar tema" [attr.aria-pressed]="layoutService.isDarkTheme()">
        <i [ngClass]="{ 'pi': true, 'pi-moon': layoutService.isDarkTheme(), 'pi-sun': !layoutService.isDarkTheme() }"></i>
      </button>
    </div>
  </div>
</div>
